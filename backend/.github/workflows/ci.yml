name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  PYTHON_VERSION: '3.11'
  POETRY_VERSION: '1.6.1'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    
    services:
      # Add any required services here
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r tests/test_requirements.txt

    - name: Run linting
      run: |
        flake8 app tests --count --select=E9,F63,F7,F82 --show-source --statistics
        black --check app tests
        isort --check-only app tests

    - name: Run type checking
      run: |
        mypy app --ignore-missing-imports

    - name: Run security scanning
      run: |
        bandit -r app -f json -o bandit-report.json
        safety check --json --output safety-report.json

    - name: Run unit tests
      run: |
        pytest tests/unit -v --cov=app --cov-report=xml:unit-coverage.xml

    - name: Run integration tests
      run: |
        pytest tests/integration -v --cov=app --cov-report=xml:integration-coverage.xml

    - name: Run boundary condition tests
      run: |
        pytest tests/unit/test_boundary_conditions.py -v

    - name: Run security tests
      run: |
        pytest tests/security -v

    - name: Run performance tests
      run: |
        pytest tests/performance -v --benchmark-only

    - name: Run smoke tests
      run: |
        pytest tests/integration -k "test_health_check_basic" -v

    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      with:
        files: ./unit-coverage.xml,./integration-coverage.xml
        flags: unittests,integration
        name: codecov-umbrella
        fail_ci_if_error: true

    - name: Upload security reports
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: security-reports
        path: |
          bandit-report.json
          safety-report.json

  load-test:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r tests/test_requirements.txt

    - name: Start application
      run: |
        nohup uvicorn app.main:app --host 0.0.0.0 --port 8000 &
        sleep 10

    - name: Run load tests
      run: |
        locust -f tests/performance/test_load_limits.py --headless -u 100 -r 10 -t 60s --host http://localhost:8000

  security-scan:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r tests/test_requirements.txt

    - name: Run security scan
      run: |
        bandit -r app -f json -o security-scan.json
        safety check --json --output safety-scan.json
        semgrep --config=auto app --json --output=semgrep-scan.json

    - name: Upload security scan results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: security-scan-results
        path: |
          security-scan.json
          safety-scan.json
          semgrep-scan.json

  openapi-validation:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r tests/test_requirements.txt

    - name: Start application
      run: |
        nohup uvicorn app.main:app --host 0.0.0.0 --port 8000 &
        sleep 10

    - name: Validate OpenAPI spec
      run: |
        python -c "import requests; print(requests.get('http://localhost:8000/docs').status_code)"
        python -c "import requests; print(requests.get('http://localhost:8000/openapi.json').status_code)"

    - name: Run OpenAPI validation
      run: |
        schemathesis run http://localhost:8000/openapi.json --checks=all --max-response-time=5000

  deploy-staging:
    runs-on: ubuntu-latest
    needs: [test, security-scan, openapi-validation]
    if: github.ref == 'refs/heads/develop'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to staging
      run: |
        echo "Deploying to staging environment..."
        # Add staging deployment steps here

  deploy-production:
    runs-on: ubuntu-latest
    needs: [test, security-scan, openapi-validation, load-test]
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to production
      run: |
        echo "Deploying to production environment..."
        # Add production deployment steps here

  notify:
    runs-on: ubuntu-latest
    needs: [test, security-scan, openapi-validation, load-test]
    if: always()
    
    steps:
    - name: Notify on failure
      if: failure()
      run: |
        echo "Tests failed! Check the logs for details."
        # Add notification logic here (Slack, email, etc.)

    - name: Notify on success
      if: success()
      run: |
        echo "All tests passed successfully!"
        # Add notification logic here