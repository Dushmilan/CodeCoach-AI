services:
  # Backend API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: codecoach-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      - DATABASE_URL=sqlite:///./codecoach.db
      - PISTON_API_URL=http://piston:2000/api/v2/piston
    volumes:
      - backend-data:/app/data
    depends_on:
      - piston
    networks:
      - codecoach-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend Service - Uses dev server for demo
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: codecoach-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - NEXT_PUBLIC_WS_URL=ws://backend:8000
    depends_on:
      - backend
    networks:
      - codecoach-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Piston Code Execution Engine
  piston:
    image: ghcr.io/engineer-man/piston:latest
    container_name: codecoach-piston
    restart: unless-stopped
    ports:
      - "2000:2000"
    volumes:
      - piston-data:/piston
    networks:
      - codecoach-network
    environment:
      - PISTON_DISABLE_NETWORK_ACCESS=true
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:2000/api/v2/runtimes"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  codecoach-network:
    driver: bridge

volumes:
  backend-data:
  piston-data:
