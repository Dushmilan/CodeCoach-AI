services:
  - type: web
    name: codecoach-ai-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: codecoach-postgres
          property: connectionString

      - key: ENVIRONMENT
        value: production
      - key: SECRET_KEY
        generateValue: true
    healthCheckPath: /health
    autoDeploy: true
    scaling:
      minInstances: 0
      maxInstances: 10
      targetCPUPercent: 70
    preDeployCommand: python -m alembic upgrade head



databases:
  - name: codecoach-postgres
    databaseName: codecoach_ai
    user: codecoach_user
    plan: starter
    postgresMajorVersion: 15
    extensions:
      - pgvector